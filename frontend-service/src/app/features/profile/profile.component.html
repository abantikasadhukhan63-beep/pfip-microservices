<div class="space-y-6 max-w-4xl mx-auto">
  <div class="flex items-center justify-between">
    <h2 class="text-3xl font-bold text-gray-900">User Profile</h2>
  </div>

  <div *ngIf="isLoading" class="flex justify-center p-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600"></div>
  </div>

  <mat-card *ngIf="!isLoading && user" class="overflow-hidden rounded-2xl shadow-lg border border-gray-100">
    <!-- Cover Background -->
    <div class="h-32 bg-gradient-to-r from-primary-600 to-blue-600 relative"></div>
    
    <!-- Profile Info -->
    <div class="px-8 pb-8 relative">
      <div class="flex justify-between items-end -mt-16 mb-6">
        <div class="bg-white p-2 rounded-full shadow-md">
          <div class="w-24 h-24 bg-primary-100 text-primary-600 rounded-full flex items-center justify-center text-4xl font-bold">
            {{ user.username.charAt(0).toUpperCase() }}
          </div>
        </div>
        <button mat-stroked-button color="primary" class="rounded-full px-6">Edit Profile</button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
          <h3 class="text-2xl font-bold text-gray-900">{{ user.username }}</h3>
          <p class="text-gray-500 flex items-center mt-1">
            <mat-icon class="text-sm mr-1">email</mat-icon> {{ user.email }}
          </p>
        </div>

        <div class="bg-gray-50 p-6 rounded-xl border border-gray-100">
          <h4 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Account Details</h4>
          
          <div class="space-y-4">
            <div class="flex justify-between items-center">
              <span class="text-gray-600">User ID</span>
              <span class="font-medium text-gray-900">#{{ user.id }}</span>
            </div>
            <mat-divider></mat-divider>
            <div class="flex justify-between items-center">
              <span class="text-gray-600">Status</span>
              <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                    [ngClass]="user.enabled ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'">
                {{ user.enabled ? 'Active' : 'Disabled' }}
              </span>
            </div>
            <mat-divider></mat-divider>
            <div class="flex justify-between items-center">
              <span class="text-gray-600">Roles</span>
              <div class="flex gap-2">
                <span *ngFor="let role of user.roles" class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-md font-medium">
                  {{ role }}
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </mat-card>
</div>
