<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-50 to-primary-100 py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
  <!-- Decorative background elements -->
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary-200 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
  <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>
  <div class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-4000"></div>

  <mat-card class="w-full max-w-md p-8 bg-white/80 backdrop-blur-lg shadow-xl rounded-2xl z-10 border border-white/50">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Create Account</h2>
      <p class="text-sm text-gray-600">Join PFIP to manage your transactions</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div class="bg-red-50 text-red-600 p-4 rounded-lg text-sm border border-red-100" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" placeholder="Choose a username">
        <mat-error *ngIf="registerForm.get('username')?.hasError('required')">Username is required</mat-error>
        <mat-error *ngIf="registerForm.get('username')?.hasError('minlength')">Minimum 3 characters required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Email Address</mat-label>
        <input matInput formControlName="email" type="email" placeholder="Enter your email">
        <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Invalid email format</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" type="password" placeholder="Create a password">
        <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Minimum 6 characters required</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" class="w-full py-6 text-lg font-semibold rounded-xl shadow-lg transition-transform hover:scale-[1.02]" [disabled]="registerForm.invalid || isLoading">
        <mat-spinner diameter="24" *ngIf="isLoading" class="mr-2 inline-block"></mat-spinner>
        <span *ngIf="!isLoading">Sign Up</span>
      </button>

      <div class="text-center mt-4 text-sm text-gray-600">
        Already have an account? 
        <a routerLink="/login" class="font-medium text-primary-600 hover:text-primary-500 transition-colors">Sign in here</a>
      </div>
    </form>
  </mat-card>
</div>
