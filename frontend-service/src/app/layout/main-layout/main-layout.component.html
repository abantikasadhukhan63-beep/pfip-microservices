<mat-sidenav-container class="h-full bg-gray-50">
  <mat-sidenav #sidenav mode="side" opened class="w-64 bg-white border-r border-gray-200">
    <div class="p-6 flex items-center space-x-3 text-primary-600">
      <mat-icon class="scale-150">account_balance</mat-icon>
      <h1 class="text-2xl font-bold tracking-tight">PFIP Bank</h1>
    </div>
    
    <mat-nav-list class="px-4">
      <a mat-list-item routerLink="/dashboard" routerLinkActive="bg-primary-50 text-primary-600 rounded-lg" class="mb-2">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/transactions" routerLinkActive="bg-primary-50 text-primary-600 rounded-lg" class="mb-2">
        <mat-icon matListItemIcon>receipt_long</mat-icon>
        <span matListItemTitle>Transactions</span>
      </a>
      <a mat-list-item routerLink="/profile" routerLinkActive="bg-primary-50 text-primary-600 rounded-lg" class="mb-2">
        <mat-icon matListItemIcon>person</mat-icon>
        <span matListItemTitle>Profile</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="flex flex-col h-full">
    <mat-toolbar class="bg-white border-b border-gray-200 flex justify-between">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <div class="flex items-center space-x-4">
        <button mat-icon-button color="warn" (click)="logout()" title="Logout">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </mat-toolbar>
    
    <main class="flex-1 overflow-auto p-6">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
